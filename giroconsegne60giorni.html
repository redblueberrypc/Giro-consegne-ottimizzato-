/**
 * GESTIONE API KEY GRAPHHOPPER (60 GIORNI)
 */
function getGraphHopperKey() {
  const KEY_STORAGE = 'gh_api_key_persistent';
  const EXPIRY_STORAGE = 'gh_api_key_expiry';
  const DAYS_60_MS = 60 * 24 * 60 * 60 * 1000;
  
  const savedKey = localStorage.getItem(KEY_STORAGE);
  const expiry = localStorage.getItem(EXPIRY_STORAGE);
  const now = Date.now();

  // Se la chiave esiste ed è ancora valida, la restituisce
  if (savedKey && expiry && now < parseInt(expiry)) {
    return savedKey;
  }

  // Altrimenti la richiede all'utente
  let newKey = prompt("Inserisci la tua API Key di GraphHopper (valida per 60 giorni):");
  
  if (newKey && newKey.trim().length > 5) {
    newKey = newKey.trim();
    localStorage.setItem(KEY_STORAGE, newKey);
    localStorage.setItem(EXPIRY_STORAGE, (now + DAYS_60_MS).toString());
    return newKey;
  } else {
    alert("API Key non valida. L'applicazione potrebbe non funzionare correttamente.");
    return "";
  }
}

// Inizializzazione della chiave globale
